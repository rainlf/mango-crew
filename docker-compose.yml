version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mgtt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: mgtt
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

volumes:
  mysql-data:
