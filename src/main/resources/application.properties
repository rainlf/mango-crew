spring.application.name=mgtt-be
# 生产环境配置
# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/mgtt?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 初始化器配置
mgtt.data.initialize=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# 关闭SQL语句直接打印，通过日志配置控制
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# 仅在需要时通过日志级别查看SQL
# 如需查看SQL，可临时设置日志级别为DEBUG
spring.jpa.hibernate.ddl-auto=update
# SwaggerUI
springdoc.swagger-ui.path=/swagger-ui.html